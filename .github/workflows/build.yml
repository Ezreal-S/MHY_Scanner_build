name: Build MHY_Scanner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ============ 1. 拉代码 ============
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ============ 2. 安装 Qt ============
      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          dir: ${{ github.workspace }}/qt

      # ============ 3. 缓存 vcpkg + 已编译的包 ============
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: |
            C:/vcpkg
            !C/vcpkg/.git
          key: vcpkg-windows-${{ hashFiles('vcpkg.json', '.github/workflows/build.yml') }}
          restore-keys: |
            vcpkg-windows-

      # ============ 4. 安装 vcpkg + 依赖 ============
      - name: Setup vcpkg
        run: |
          if (-not (Test-Path "C:/vcpkg/vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
            cd C:/vcpkg
            .\bootstrap-vcpkg.bat
          }
          C:/vcpkg/vcpkg.exe install opencv core imgproc imgcodecs highgui --triplet x64-windows
          C:/vcpkg/vcpkg.exe install ffmpeg --triplet x64-windows
          C:/vcpkg/vcpkg.exe install cpr --triplet x64-windows
          C:/vcpkg/vcpkg.exe install nlohmann-json --triplet x64-windows
          C:/vcpkg/vcpkg.exe install openssl --triplet x64-windows
          C:/vcpkg/vcpkg.exe install nayuki-qr-code-generator --triplet x64-windows
        shell: pwsh

      # ============ 5. CMake 配置 ============
      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/qt/6.8.0/msvc2022_64" `
            -DUSE_OPENSSL=ON
        shell: pwsh

      # ============ 6. 编译 ============
      - name: Build
        run: cmake --build build --config Release
        shell: pwsh

      # ============ 7. 收集产物 ============
      - name: Deploy Qt DLLs
        run: |
          ${{ github.workspace }}/qt/6.8.0/msvc2022_64/bin/windeployqt.exe `
            build/bin/Release/MHY_Scanner.exe
        shell: pwsh

      # ============ 8. 打包上传 ============
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MHY_Scanner-windows-x64
          path: build/bin/Release/
          retention-days: 30
