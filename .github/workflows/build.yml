name: Build MHY_Scanner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ============ 1. 拉代码 ============
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ============ 2. 安装 Qt ============
      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          dir: ${{ github.workspace }}/qt

      # ============ 3. 缓存 vcpkg 已编译的包 ============
      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-win64-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-win64-

      # ============ 4. CMake 配置（vcpkg 会自动根据 vcpkg.json 安装依赖） ============
      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/qt/6.8.0/msvc2022_64" `
            -DUSE_OPENSSL=ON
        shell: pwsh

      # ============ 5. 编译 ============
      - name: Build
        run: cmake --build build --config Release
        shell: pwsh

      # ============ 6. 部署 Qt DLL ============
      - name: Deploy Qt DLLs
        run: |
          ${{ github.workspace }}/qt/6.8.0/msvc2022_64/bin/windeployqt.exe `
            build/bin/Release/MHY_Scanner.exe
        shell: pwsh

      # ============ 7. 上传产物 ============
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MHY_Scanner-windows-x64
          path: build/bin/Release/
          retention-days: 30
