name: Build macOS

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  VCPKG_DEFAULT_TRIPLET: arm64-osx
  VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
  VCPKG_MAX_CONCURRENCY: 4

jobs:
  build:
    name: Build on macOS ${{ matrix.arch }}
    runs-on: macos-15

    strategy:
      matrix:
        arch: [arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: ${{ runner.os }}-${{ matrix.arch }}-release
        max-size: 500M

    - name: Install build dependencies
      run: |
        brew install cmake ninja pkg-config autoconf autoconf-archive automake libtool
        if [ ! -f "$(brew --prefix)/bin/libtoolize" ]; then
          ln -sf "$(brew --prefix)/bin/glibtoolize" "$(brew --prefix)/bin/libtoolize"
        fi

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/vcpkg_installed
          ~/.cache/vcpkg
        key: vcpkg-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-${{ matrix.arch }}-

    - name: Setup vcpkg and install dependencies
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: 'vcpkg.json'
        runVcpkgInstall: true
      env:
        VCPKG_BUILD_TYPE: release
        VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    - name: Build project (Release)
      run: |
        cmake --preset Release-CI
        cmake --build --preset Release-CI

    - name: Ad-hoc signing
      run: |
        APP_PATH="Release-CI_build/bin/Release/MHY_Scanner.app"
        if [ -d "$APP_PATH" ]; then
          xattr -cr "$APP_PATH"
          codesign --force --deep -s - "$APP_PATH" || true
          echo "Signing completed"
        else
          echo "App not found at $APP_PATH"
          ls -la Release-CI_build/bin/Release/ || true
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MHY_Scanner-macOS-${{ matrix.arch }}-Release
        path: Release-CI_build/bin/**/MHY_Scanner.app
        retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: macos-15
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create DMG packages
      run: |
        for app in artifacts/*/MHY_Scanner.app; do
          if [ -d "$app" ]; then
            appname=$(basename "$app")
            appdir=$(dirname "$app")
            arch=$(basename "$appdir" | cut -d- -f3)

            hdiutil create -volname "MHY_Scanner" \
              -srcfolder "$app" \
              -ov -format UDZO \
              "MHY_Scanner-macOS-${arch}.dmg"
          fi
        done

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: MHY_Scanner-macOS-*.dmg
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
